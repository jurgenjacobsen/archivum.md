name: Wails build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - platform: 'linux/amd64'
            os: 'ubuntu-22.04'
          - platform: 'windows/amd64'
            os: 'windows-2022'
          - platform: 'darwin/universal'
            os: 'macos-latest'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential

      - name: Install Windows Dependencies (NSIS)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Verify Makensis
        if: runner.os == 'Windows'
        run: makensis /VERSION

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          wails build -platform windows/amd64 -nsis
          # Rename for a clean download name
          $installer = Get-ChildItem -Path build/bin -Filter "*installer.exe" | Select-Object -First 1
          if ($installer) {
            Move-Item -Path $installer.FullName -Destination "build/bin/Archivum.md-Installer.exe" -Force
          } else {
            Write-Error "Installer not found in build/bin after NSIS build"
          }

      - name: Build MacOS
        if: runner.os == 'macOS'
        run: |
          wails build -platform darwin/universal
          npm install -g create-dmg
          create-dmg build/bin/Archivum.md.app build/bin/ || true
          mv build/bin/*.dmg build/bin/Archivum.md.dmg || true

      - name: Build Linux
        if: runner.os == 'Linux'
        run: |
          wails build -platform linux/amd64
          cd build/bin
          tar -czvf Archivum.md-Linux.tar.gz Archivum.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/Archivum.md-Installer.exe
            build/bin/Archivum.md.dmg
            build/bin/Archivum.md-Linux.tar.gz
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
